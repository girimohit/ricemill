<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products - Rahul Ruby Rice Mill</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    }

    header {
      background: #fff;
      padding: 20px 30px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #333;
    }

    nav a:hover, nav a.active {
      color: #007bff;
    }

    h1 {
      text-align: center;
      margin: 40px 0 10px;
      font-size: 36px;
    }

    .filter-bar {
      text-align: center;
      margin-bottom: 30px;
    }

    .filter-bar button {
      margin: 5px;
      padding: 10px 20px;
      border: 1px solid #007bff;
      background: white;
      color: #007bff;
      border-radius: 5px;
      cursor: pointer;
    }

    .filter-bar button.active,
    .filter-bar button:hover {
      background-color: #007bff;
      color: white;
    }

    .products-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      max-width: 1100px;
      margin: auto;
      padding: 0 20px 50px;
    }

    .product-card {
      background-color: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: transform 0.3s ease;
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-5px);
    }

    .product-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .product-info {
      padding: 20px;
    }

    .product-info h3 {
      margin: 0 0 10px;
      color: #007bff;
    }

    .product-info p {
      font-size: 14px;
      color: #555;
    }

    .product-info .price {
      margin-top: 10px;
      font-weight: bold;
      color: #222;
    }

    .badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #28a745;
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .pagination {
      text-align: center;
      margin: 30px 0;
    }

    .pagination button {
      margin: 0 5px;
      padding: 8px 14px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    .pagination button.active {
      background-color: #0056b3;
    }

    footer {
      text-align: center;
      padding: 20px;
      background-color: #eee;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2 style="margin: 0;">Rahul Ruby Rice Mill</h2>
      <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'product' %}"  class="active">Product</a>
        <a href="{% url 'aboutus' %}">About Us</a>
        <a href="{% url 'contactus' %}" >Contact Us</a>
      </nav>
    </div>
  </header>

  <h1>Our Rice Products</h1>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="filter-btn active" data-type="all">All</button>
    <button class="filter-btn" data-type="basmati">Basmati</button>
    <button class="filter-btn" data-type="brown">Brown</button>
    <button class="filter-btn" data-type="broken">Broken</button>
  </div>

  <!-- Products Grid -->
  <div class="products-container" id="productList">
    <!-- Products inserted via JS -->
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination"></div>

  <!-- Footer -->
  <footer>
    &copy; 2025 Rahul Ruby Rice Mill. All rights reserved.
  </footer>

  <!-- JS Logic -->
  <script>
    const products = [
      {
        name: "Basmati Rice",
        desc: "Premium long grain rice with aroma. Great for biryani.",
        price: "₹120/kg",
        image: "https://images.unsplash.com/photo-1603293742463-d8be54c829aa",
        type: "basmati",
        badge: "Best Seller"
      },
      {
        name: "Brown Rice",
        desc: "Healthy option rich in fiber and nutrients.",
        price: "₹95/kg",
        image: "https://images.unsplash.com/photo-1562440499-64c9a111f87e",
        type: "brown",
        badge: "Organic"
      },
      {
        name: "Broken Rice",
        desc: "Economical rice for bulk cooking or pet food.",
        price: "₹40/kg",
        image: "https://images.unsplash.com/photo-1615910051803-7a64e267367e",
        type: "broken",
        badge: ""
      },
      {
        name: "Sona Masoori",
        desc: "Soft and lightweight rice for daily use.",
        price: "₹75/kg",
        image: "https://images.unsplash.com/photo-1600093463592-bc0b69d9b5fc",
        type: "basmati",
        badge: "Popular"
      },
      {
        name: "Red Rice",
        desc: "Unpolished rice packed with antioxidants.",
        price: "₹100/kg",
        image: "https://images.unsplash.com/photo-1635010301094-c0711cb64b61",
        type: "brown",
        badge: "Organic"
      },
      {
        name: "Parboiled Rice",
        desc: "Partially boiled for higher nutritional value.",
        price: "₹85/kg",
        image: "https://images.unsplash.com/photo-1567767292278-98e6c73be2fb",
        type: "broken",
        badge: ""
      },
      {
        name: "Jeera Samba Rice",
        desc: "Small grain, aromatic variety from South India.",
        price: "₹110/kg",
        image: "https://images.unsplash.com/photo-1671557704867-9a1e1d6be2ec",
        type: "basmati",
        badge: ""
      },
      {
        name: "Black Rice",
        desc: "Exotic rice high in protein & iron.",
        price: "₹150/kg",
        image: "https://images.unsplash.com/photo-1634973332183-80b3659c61d8",
        type: "brown",
        badge: "Superfood"
      }
    ];

    const itemsPerPage = 6;
    let currentPage = 1;
    let currentFilter = "all";

    const productList = document.getElementById('productList');
    const pagination = document.getElementById('pagination');
    const filterButtons = document.querySelectorAll('.filter-btn');

    function renderProducts() {
      const filtered = products.filter(p => currentFilter === "all" || p.type === currentFilter);
      const start = (currentPage - 1) * itemsPerPage;
      const pageProducts = filtered.slice(start, start + itemsPerPage);

      productList.innerHTML = pageProducts.map(p => `
        <div class="product-card">
          ${p.badge ? `<div class="badge">${p.badge}</div>` : ""}
          <img src="${p.image}" alt="${p.name}">
          <div class="product-info">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <div class="price">${p.price}</div>
          </div>
        </div>
      `).join("");

      renderPagination(filtered.length);
    }

    function renderPagination(totalItems) {
      const totalPages = Math.ceil(totalItems / itemsPerPage);
      let buttons = '';
      for (let i = 1; i <= totalPages; i++) {
        buttons += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      pagination.innerHTML = buttons;
    }

    function goToPage(page) {
      currentPage = page;
      renderProducts();
    }

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.type;
        currentPage = 1;
        renderProducts();
      });
    });

    renderProducts();
  </script>
</body>
</html>
